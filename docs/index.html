<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dreamy Image Gallery</title>
<link rel="icon" href="Images/favicon.png" type="image/png">

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="title">✨ Soft Dreamy Gallery ✨</h1>

  <!-- FILTER BUTTONS -->
  <div class="filters">
    <button data-filter="all" class="active">All</button>
    <button data-filter="flowers">Flowers</button>
    <button data-filter="sky">Sky</button>
    <button data-filter="nature">Nature</button>
  </div>

  <!-- GALLERY -->
<div class="gallery">
  <img src="Images/img1.jpg" alt="Pink tulips" data-category="flowers">
  <img src="Images/img2.jpg" alt="Blue sky landscape" data-category="sky">
  <img src="Images/img3.jpg" alt="Green nature view" data-category="nature">
  <img src="Images/img4.jpg" alt="Flower scenery" data-category="flowers">
  <img src="Images/img5.jpg" alt="Beautiful sky view" data-category="sky">
  <img src="Images/img6.jpg" alt="Nature landscape" data-category="nature">
  <img src="Images/img7.jpg" alt="Flower field" data-category="flowers">
  <img src="Images/img8.jpg" alt="Cloudy sky" data-category="sky">
  <img src="Images/img9.jpg" alt="Forest nature view" data-category="nature">
  <img src="Images/img10.jpg" alt="Soft flower image" data-category="flowers">
  <img src="Images/img11.jpg" alt="Dreamy sky" data-category="sky">
  <img src="Images/img12.jpg" alt="Mountain nature view" data-category="nature">
</div>

  <!-- LIGHTBOX -->
  <div class="lightbox">
    <span class="close">&times;</span>
    <img class="lightbox-img" src="" alt="Gallery preview">
    <div class="nav prev">&#10094;</div>
    <div class="nav next">&#10095;</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
